name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run web tests
        run: pnpm --filter @favpoll/web test:run

      - name: Run admin tests
        run: pnpm --filter @favpoll/admin test:run

  # ── E2E tests (advisory — non-blocking) ────────────────────────────────────
  # Runs against staging (PLAYWRIGHT_BASE_URL = staging Vercel URL).
  # continue-on-error: true means a failure here does NOT block merge.
  # Promote to a required check once the suite has proven stable over a few PRs.
  #
  # Required GitHub secrets (set under repo Settings → Secrets → Actions):
  #   E2E_BASE_URL                 — staging app URL (e.g. https://favpoll-web-gamma.vercel.app)
  #   E2E_SUPABASE_URL             — staging Supabase project URL
  #   E2E_SUPABASE_SERVICE_ROLE_KEY — staging service role key (bypasses RLS)
  #   E2E_STRIPE_PUBLISHABLE_KEY   — Stripe test-mode publishable key
  #   E2E_TEST_EMAIL               — email of Clerk test account (email + password auth)
  #   E2E_TEST_PASSWORD            — password of Clerk test account
  #   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY — Clerk publishable key (same as dev/preview)
  #
  # Until secrets are configured, this job will fail gracefully (most tests
  # skip themselves when credentials are absent).
  e2e:
    name: E2E Tests (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        run: pnpm --filter @favpoll/web test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.E2E_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web
        run: pnpm --filter @favpoll/web typecheck

      - name: Typecheck admin
        run: pnpm --filter @favpoll/admin typecheck

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm --filter @favpoll/web exec prettier --check .
